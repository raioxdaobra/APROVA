<?xml version="1.0" encoding="UTF-8"?>
<!--
  APROVA — Símbolo monocromático (currentColor)
  Pra contextos onde cor não cabe: documentos, prints, monocromático em emails,
  ou stamping em qualquer cor via CSS (`color: ...`).

  - Fundo: nenhum (transparente)
  - Stroke: currentColor (herda a cor do contexto CSS)
  - Default fallback: #0F172A (slate-900)

  O "A" e o check usam o mesmo peso de stroke pra harmonizar quando a cor é única.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="256" height="256" viewBox="0 0 256 256"
     role="img" aria-label="APROVA"
     fill="none" stroke="currentColor" color="#0F172A">

  <!-- Perna esquerda do A -->
  <line x1="128" y1="36" x2="44" y2="220"
        stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Perna direita do A -->
  <line x1="128" y1="36" x2="212" y2="220"
        stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark — mesmo peso do A, posição central -->
  <polyline points="74,148 106,176 178,104"
            stroke-width="30"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
